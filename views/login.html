<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | СкладСервис</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 200px);
        }
        .login-card {
            max-width: 400px;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-inner">
            <div class="logo">СкладСервис</div>
            <nav class="nav-menu">
                <a href="/">Главная</a>
                <a href="/warehouses">Склады</a>
                <a href="/gallery">Галерея</a>
                <a href="/reviews">Отзывы</a>
                <a href="/about">О нас</a>
                <a href="/login">Вход</a>
                <a href="/register">Регистрация</a>
                <button id="theme-toggle" class="theme-toggle">
                    <img src="/icons/moon.svg" alt="Переключить тему">
                </button>
            </nav>
        </div>
    </header>

    <main class="container login-wrapper">
        <div class="card login-card">
            <h2>Вход</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <div class="password-container">
                        <input type="password" id="password" required>
                        <img src="/icons/eye.svg" class="toggle-password" data-target="password" alt="Показать пароль">
                    </div>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Войти</button>
                <div id="error" class="error" style="margin-top: 1rem;"></div>
            </form>
            <p style="margin-top: 1.5rem; text-align: center;">
                Нет аккаунта? <a href="/register" style="color: var(--accent-primary);">Зарегистрироваться</a>
            </p>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2025 СкладСервис. Все права защищены.</p>
        </div>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const returnTo = urlParams.get('returnTo') || '/dashboard';

        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function() {
                const targetId = this.dataset.target;
                const input = document.getElementById(targetId);
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                this.src = type === 'password' ? '/icons/eye.svg' : '/icons/eye-slash.svg';
            });
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, returnTo })
            });
            const data = await res.json();
            if (res.ok) {
                if (data.redirect) {
                    window.location.href = data.redirect;
                } else {
                    if (data.role === 'manager') {
                        window.location.href = '/manager-panel';
                    } else if (data.role === 'director') {
                        window.location.href = '/director-panel';
                    } else {
                        window.location.href = '/dashboard';
                    }
                }
            } else {
                document.getElementById('error').textContent = data.error;
            }
        });
    </script>
    <script src="/js/theme.js"></script>
</body>
</html>
