<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | ЛегатоСклад</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            width: 100%;
            box-sizing: border-box;
            padding-right: 40px;
        }
        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }
        .toggle-password img {
            width: 20px;
            height: 20px;
            filter: brightness(0) invert(1);
        }
        body.light-theme .toggle-password img {
            filter: brightness(0) invert(0);
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-inner">
            <div class="logo">ЛегатоСклад</div>
            <nav class="nav-menu">
                <a href="/">Главная</a>
                <a href="/warehouses">Склады</a>
                <a href="/reviews">Отзывы</a>
                <a href="/about">О нас</a>
                <a href="/gallery">Галерея</a>
                <a href="/login">Вход</a>
                <a href="/register">Регистрация</a>
                <button id="theme-toggle" class="theme-toggle">
                    <img src="/icons/moon.svg" alt="Переключить тему">
                </button>
            </nav>
        </div>
    </header>

    <main style="padding: 3rem 0;">
        <div class="container">
            <div class="card" style="max-width: 400px; margin: 0 auto;">
                <h2>Вход</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" required>
                            <button type="button" class="toggle-password" id="toggle-password-btn">
                                <img src="/icons/eye.svg" alt="Показать пароль" id="toggle-icon">
                            </button>
                        </div>
                    </div>
                    <div id="login-error" style="color: #fca5a5; margin-bottom: 1rem;"></div>
                    <button type="submit" class="btn">Войти</button>
                </form>
                <p style="margin-top: 1rem;">Нет аккаунта? <a href="/register" style="color: var(--accent-primary);">Зарегистрироваться</a></p>
            </div>
        </div>
    </main>

    <script src="/js/auth.js"></script>
    <script src="/js/theme.js"></script>
    <script>
        const toggleBtn = document.getElementById('toggle-password-btn');
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggle-icon');

        toggleBtn.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.src = '/icons/eye-slash.svg';
                toggleIcon.alt = 'Скрыть пароль';
            } else {
                passwordInput.type = 'password';
                toggleIcon.src = '/icons/eye.svg';
                toggleIcon.alt = 'Показать пароль';
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = passwordInput.value;
            const errorDiv = document.getElementById('login-error');
            errorDiv.textContent = '';

            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = data.redirectUrl || '/dashboard';
                } else {
                    errorDiv.textContent = data.error || 'Ошибка входа';
                }
            } catch (err) {
                errorDiv.textContent = 'Ошибка соединения';
            }
        });
    </script>
</body>
</html>
