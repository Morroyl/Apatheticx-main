<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | ЛегатоСклад</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="container header-inner">
            <div class="logo">ЛегатоСклад</div>
            <nav class="nav-menu">
                <a href="/">Главная</a>
                <a href="/warehouses">Склады</a>
                <a href="/reviews">Отзывы</a>
                <a href="/about">О нас</a>
                <a href="/gallery">Галерея</a>
                <a href="/login">Вход</a>
                <a href="/register">Регистрация</a>
                <button id="theme-toggle" class="theme-toggle">
                    <img src="/icons/moon.svg" alt="Переключить тему">
                </button>
            </nav>
        </div>
    </header>

    <main style="padding: 3rem 0;">
        <div class="container">
            <div class="card" style="max-width: 400px; margin: 0 auto;">
                <h2>Вход</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input type="password" id="password" required>
                    </div>
                    <div id="login-error" style="color: #fca5a5; margin-bottom: 1rem;"></div>
                    <button type="submit" class="btn">Войти</button>
                </form>
                <p style="margin-top: 1rem;">Нет аккаунта? <a href="/register" style="color: var(--accent-primary);">Зарегистрироваться</a></p>
            </div>
        </div>
    </main>

    <script src="/js/auth.js"></script>
    <script src="/js/theme.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            errorDiv.textContent = ''; // очищаем предыдущую ошибку

            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = data.redirectUrl || '/dashboard';
                } else {
                    errorDiv.textContent = data.error || 'Ошибка входа';
                }
            } catch (err) {
                errorDiv.textContent = 'Ошибка соединения';
            }
        });
    </script>
</body>
</html>
