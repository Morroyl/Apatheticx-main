<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель директора | ЛегатоСклад</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <div class="container header-inner">
            <div class="logo">ЛегатоСклад</div>
            <nav class="nav-menu">
                <a href="/">Главная</a>
                <a href="/warehouses">Склады</a>
                <a href="/reviews">Отзывы</a>
                <a href="/about">О нас</a>
                <a href="/gallery">Галерея</a>
                <button id="theme-toggle" class="theme-toggle">
                    <img src="/icons/moon.svg" alt="Переключить тему">
                </button>
            </nav>
        </div>
    </header>

    <main class="container" style="padding: 2rem 0;">
        <h1 style="font-size: 2.5rem; margin-bottom: 2rem;">Панель директора</h1>

        <div class="tab-bar">
            <button class="tab" data-tab="warehouses">Склады</button>
            <button class="tab" data-tab="users">Пользователи</button>
            <button class="tab active" data-tab="requests">Заявки</button>
            <button class="tab" data-tab="archive">Архив</button>
            <button class="tab" data-tab="reviews">Отзывы</button>
        </div>

        <div id="warehouses-tab" class="tab-pane">
            <div class="card">
                <h3>Добавить новый склад</h3>
                <form id="add-warehouse-form" class="inline-form">
                    <input type="text" id="warehouse-name" placeholder="Название" required>
                    <input type="text" id="warehouse-address" placeholder="Адрес" required>
                    <input type="number" id="warehouse-area" placeholder="Площадь (м²)" required step="0.01">
                    <input type="number" id="warehouse-price" placeholder="Цена за м²/мес" required step="0.01">
                    <input type="text" id="warehouse-image" placeholder="URL изображения">
                    <input type="text" id="warehouse-desc" placeholder="Описание">
                    <input type="text" id="warehouse-cat" placeholder="Категория">
                    <button type="submit" class="btn">Добавить</button>
                </form>
            </div>
            <div class="card">
                <h3>Список складов</h3>
                <div id="warehouses-list"><p>Загрузка...</p></div>
            </div>
        </div>

        <div id="users-tab" class="tab-pane">
            <div class="card">
                <h3>Пользователи</h3>
                <div id="users-list"><p>Загрузка...</p></div>
            </div>
        </div>

        <!-- Вкладка Активные заявки -->
        <div id="requests-tab" class="tab-pane active">
            <div class="card">
                <h3>Активные заявки</h3>
                <div id="active-requests"><p>Загрузка...</p></div>
            </div>
            <div id="chat-container" class="card chat-container" style="display: none;">
                <h3>Чат по заявке #<span id="chat-request-id"></span></h3>
                <div id="chat-messages" class="chat-messages"></div>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="chat-input" placeholder="Введите сообщение..." style="flex: 1;">
                    <button id="send-message-btn" class="btn">Отправить</button>
                    <button id="close-chat-btn" class="btn btn-outline">Закрыть</button>
                </div>
            </div>
        </div>

        <!-- Вкладка Архив -->
        <div id="archive-tab" class="tab-pane">
            <div class="card">
                <h3>Архив завершённых заявок</h3>
                <div id="archive-requests"><p>Загрузка...</p></div>
            </div>
        </div>

        <!-- Вкладка Отзывы -->
        <div id="reviews-tab" class="tab-pane">
            <div class="card">
                <h3>Управление отзывами</h3>
                <div id="reviews-list"><p>Загрузка...</p></div>
            </div>
        </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/theme.js"></script>
    <style>
        /* Вертикальные отступы для формы добавления склада */
        #add-warehouse-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        #add-warehouse-form input,
        #add-warehouse-form select,
        #add-warehouse-form button {
            width: 100%;
            box-sizing: border-box;
        }
    </style>

    <script>
        let currentUserId = null;
        let currentRequestId = null;
        const socket = io();

        socket.on('joined-room', (data) => {
            console.log('✅ Подтверждено присоединение к комнате заявки', data.leaseRequestId);
        });

        fetch('/auth/me')
            .then(res => res.json())
            .then(user => {
                currentUserId = user.id;
            })
            .catch(err => console.error('Ошибка получения пользователя', err));

        // Управление табами
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                const tabId = tab.dataset.tab;
                document.getElementById(tabId + '-tab').classList.add('active');
                if (tabId === 'warehouses') loadWarehouses();
                if (tabId === 'users') loadUsers();
                if (tabId === 'requests') loadActiveRequests();
                if (tabId === 'archive') loadArchiveRequests();
                if (tabId === 'reviews') loadReviews();
            });
        });

        let allWarehouses = [];

        function renderWarehouses(warehouses) {
            const container = document.getElementById('warehouses-list');
            if (!warehouses.length) {
                container.innerHTML = '<p>Нет складов</p>';
                return;
            }
            let html = '';
            warehouses.forEach(w => {
                html += `
                    <div class="warehouse-row">
                        <div>
                            <strong>${w.name}</strong> (${w.category || 'Без категории'})<br>
                            <small>${w.address}, площадь ${w.area} м², цена ${w.pricePerMonth} ₽/м²</small><br>
                            <small>${w.description || ''}</small>
                        </div>
                        <div style="text-align: right;">
                            <div class="warehouse-actions">
                                <button class="edit-warehouse" data-id="${w.id}">✎</button>
                                <button class="delete-warehouse" data-id="${w.id}">🗑</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;

            document.querySelectorAll('.edit-warehouse').forEach(btn => {
                btn.addEventListener('click', () => editWarehouse(btn.dataset.id));
            });
            document.querySelectorAll('.delete-warehouse').forEach(btn => {
                btn.addEventListener('click', () => deleteWarehouse(btn.dataset.id));
            });
        }

        async function loadWarehouses() {
            try {
                const res = await fetch('/director/warehouses');
                const warehouses = await res.json();
                allWarehouses = warehouses;
                renderWarehouses(warehouses);
            } catch (err) {
                document.getElementById('warehouses-list').innerHTML = '<p>Ошибка загрузки</p>';
            }
        }

        function editWarehouse(id) {
            const warehouse = allWarehouses.find(w => w.id == id);
            if (!warehouse) return;
            const newName = prompt('Название:', warehouse.name);
            if (newName === null) return;
            const newAddress = prompt('Адрес:', warehouse.address);
            const newArea = prompt('Площадь (м²):', warehouse.area);
            const newPrice = prompt('Цена за м²/мес:', warehouse.pricePerMonth);
            const newDesc = prompt('Описание:', warehouse.description || '');
            const newCat = prompt('Категория:', warehouse.category || '');
            if (!newName || !newAddress || !newArea || !newPrice) return alert('Название, адрес, площадь и цена обязательны');
            fetch(`/director/warehouses/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: newName,
                    description: newDesc,
                    address: newAddress,
                    area: parseFloat(newArea),
                    pricePerMonth: parseFloat(newPrice),
                    category: newCat
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) alert(data.error);
                else loadWarehouses();
            });
        }

        function deleteWarehouse(id) {
            if (!confirm('Удалить склад?')) return;
            fetch(`/director/warehouses/${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(data => {
                    if (data.error) alert(data.error);
                    else loadWarehouses();
                });
        }

        document.getElementById('add-warehouse-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('warehouse-name').value;
            const address = document.getElementById('warehouse-address').value;
            const area = parseFloat(document.getElementById('warehouse-area').value);
            const price = parseFloat(document.getElementById('warehouse-price').value);
            const desc = document.getElementById('warehouse-desc').value;
            const cat = document.getElementById('warehouse-cat').value;
            if (!name || !address || !area || !price) return alert('Заполните обязательные поля');
            const res = await fetch('/director/warehouses', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, description: desc, address, area, pricePerMonth: price, category: cat })
            });
            if (res.ok) {
                document.getElementById('add-warehouse-form').reset();
                loadWarehouses();
            } else {
                alert('Ошибка при добавлении');
            }
        });

        // ===== ПОЛЬЗОВАТЕЛИ =====
        async function loadUsers() {
            const container = document.getElementById('users-list');
            try {
                const res = await fetch('/director/users');
                const users = await res.json();
                if (!users.length) {
                    container.innerHTML = '<p>Нет пользователей</p>';
                    return;
                }
                let html = '<table><thead><tr><th>ID</th><th>ФИО</th><th>Email</th><th>Телефон</th><th>Роль</th><th>Действия</th></tr></thead><tbody>';
                users.forEach(u => {
                    let roleClass = '';
                    if (u.role === 'manager') roleClass = 'manager';
                    if (u.role === 'director') roleClass = 'director';
                    html += `<tr>
                        <td>${u.id}</td>
                        <td>${u.fullName}</td>
                        <td>${u.email}</td>
                        <td>${u.phone || ''}</td>
                        <td><span class="role-badge ${roleClass}">${u.role}</span></td>
                        <td>
                            ${u.role !== 'director' ? `
                                <button class="btn change-role" data-id="${u.id}" data-role="${u.role === 'manager' ? 'client' : 'manager'}">
                                    ${u.role === 'manager' ? 'Сделать клиентом' : 'Сделать менеджером'}
                                </button>
                            ` : ''}
                        </td>
                    </tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;

                document.querySelectorAll('.change-role').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const id = btn.dataset.id;
                        const newRole = btn.dataset.role;
                        fetch(`/director/users/${id}/role`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ role: newRole })
                        })
                        .then(res => res.json())
                        .then(data => {
                            if (data.error) alert(data.error);
                            else loadUsers();
                        });
                    });
                });
            } catch (err) {
                container.innerHTML = '<p>Ошибка загрузки</p>';
            }
        }

        // ===== АКТИВНЫЕ ЗАЯВКИ =====
        async function loadActiveRequests() {
            const container = document.getElementById('active-requests');
            container.innerHTML = '<p>Загрузка...</p>';
            try {
                const res = await fetch('/manager/leaserequests');
                const all = await res.json();
                const active = all.filter(r => r.status !== 'completed');
                if (active.length === 0) {
                    container.innerHTML = '<p>Нет активных заявок.</p>';
                    return;
                }
                let html = '<table class="appointments-table"><thead><tr><th>ID</th><th>Клиент</th><th>Телефон</th><th>Склад</th><th>Даты</th><th>Статус</th><th>Менеджер</th><th>Действия</th><th>Чат</th></tr></thead><tbody>';
                active.forEach(r => {
                    const dates = `${new Date(r.startDate).toLocaleDateString()} – ${new Date(r.endDate).toLocaleDateString()}`;
                    html += `<tr>
                        <td>${r.id}</td>
                        <td>${r.clientName}</td>
                        <td>${r.phone}</td>
                        <td>${r.warehouseName}</td>
                        <td>${dates}</td>
                        <td>${r.status}</td>
                        <td>${r.managerName || '—'}</td>
                        <td style="white-space: nowrap;">
                            <button class="btn status-btn" data-id="${r.id}" data-status="confirmed" style="margin-right:5px;">Подтвердить</button>
                            <button class="btn status-btn" data-id="${r.id}" data-status="cancelled" style="margin-right:5px;">Отменить</button>
                            <button class="btn status-btn" data-id="${r.id}" data-status="completed">Завершить</button>
                        </td>
                        <td><button class="btn chat-btn" data-request-id="${r.id}" ${r.status === 'completed' || r.status === 'cancelled' ? 'disabled' : ''}>Чат</button></td>
                    </tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;

                document.querySelectorAll('.status-btn').forEach(btn => {
                    btn.addEventListener('click', () => updateStatus(btn.dataset.id, btn.dataset.status));
                });
                document.querySelectorAll('.chat-btn').forEach(btn => {
                    btn.addEventListener('click', () => openChat(btn.dataset.requestId));
                });
            } catch (err) {
                container.innerHTML = '<p>Ошибка загрузки.</p>';
                console.error(err);
            }
        }

        async function updateStatus(id, status) {
            const res = await fetch(`/manager/leaserequests/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status })
            });
            if (res.ok) {
                if (document.getElementById('requests-tab').classList.contains('active')) {
                    loadActiveRequests();
                }
                if (document.getElementById('archive-tab').classList.contains('active')) {
                    loadArchiveRequests();
                }
                loadArchiveRequests();
            } else {
                alert('Ошибка обновления статуса');
            }
        }

        // ===== ЧАТ =====
        function openChat(requestId) {
            currentRequestId = requestId;
            document.getElementById('chat-container').style.display = 'block';
            document.getElementById('chat-request-id').textContent = requestId;
            document.getElementById('chat-messages').innerHTML = '';
            socket.emit('join-appointment', requestId);
            loadMessages(requestId);
        }

        async function loadMessages(requestId) {
            try {
                const res = await fetch(`/manager/leaserequests/${requestId}/messages`);
                if (!res.ok) throw new Error('Ошибка загрузки сообщений');
                const messages = await res.json();
                messages.forEach(msg => displayMessage(msg));
                scrollChatToBottom();
            } catch (err) {
                console.error('Ошибка загрузки сообщений:', err);
            }
        }

        function displayMessage(msg) {
            const chatDiv = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            if (msg.senderId === currentUserId) {
                messageDiv.classList.add('own');
            } else {
                messageDiv.classList.add('other');
            }
            const time = new Date(msg.sentAt).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            messageDiv.innerHTML = `<strong>${msg.senderName}</strong><br>${msg.message}<br><small>${time}</small>`;
            chatDiv.appendChild(messageDiv);
        }

        function scrollChatToBottom() {
            const chatDiv = document.getElementById('chat-messages');
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        document.getElementById('send-message-btn').addEventListener('click', () => {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message || !currentRequestId) return;
            socket.emit('send-message', {
                appointmentId: currentRequestId,
                senderId: currentUserId,
                message: message
            });
            input.value = '';
        });

        socket.on('new-message', (data) => {
            displayMessage(data);
            scrollChatToBottom();
        });

        document.getElementById('close-chat-btn').addEventListener('click', () => {
            document.getElementById('chat-container').style.display = 'none';
            currentRequestId = null;
        });

        // ===== АРХИВ =====
        async function loadArchiveRequests() {
            const container = document.getElementById('archive-requests');
            container.innerHTML = '<p>Загрузка...</p>';
            try {
                const res = await fetch('/manager/archive');
                const archived = await res.json();
                if (archived.length === 0) {
                    container.innerHTML = '<p>В архиве пока нет завершённых заявок.</p>';
                    return;
                }
                let html = '<table class="appointments-table archive-table"><thead><tr><th>ID</th><th>Клиент</th><th>Телефон</th><th>Склад</th><th>Даты</th><th>Менеджер</th></tr></thead><tbody>';
                archived.forEach(a => {
                    const dates = `${new Date(a.startDate).toLocaleDateString()} – ${new Date(a.endDate).toLocaleDateString()}`;
                    html += `<tr>
                        <td>${a.originalId}</td>
                        <td>${a.clientName}</td>
                        <td>${a.phone}</td>
                        <td>${a.warehouseName}</td>
                        <td>${dates}</td>
                        <td>${a.managerName || 'Неизвестно'}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = '<p>Ошибка загрузки архива.</p>';
                console.error(err);
            }
        }

        // ===== ОТЗЫВЫ =====
        async function loadReviews() {
            const container = document.getElementById('reviews-list');
            container.innerHTML = '<p>Загрузка...</p>';
            try {
                const res = await fetch('/api/reviews');
                const reviews = await res.json();
                if (reviews.length === 0) {
                    container.innerHTML = '<p>Нет отзывов.</p>';
                    return;
                }
                let html = '<table class="appointments-table"><thead><tr><th>ID</th><th>Пользователь</th><th>Рейтинг</th><th>Отзыв</th><th>Дата</th><th>Склад</th><th>Действия</th></tr></thead><tbody>';
                reviews.forEach(r => {
                    const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
                    const date = new Date(r.createdAt).toLocaleDateString('ru-RU');
                    html += `<tr>
                        <td>${r.id}</td>
                        <td>${r.fullName}</td>
                        <td style="color: #fbbf24;">${stars}</td>
                        <td>${r.comment || ''}</td>
                        <td>${date}</td>
                        <td>${r.warehouseName || 'Общий'}</td>
                        <td>
                            <button class="btn delete-review" data-id="${r.id}">Удалить</button>
                        </td>
                    </tr>`;
                });
                html += '</tbody></table>';
                container.innerHTML = html;

                document.querySelectorAll('.delete-review').forEach(btn => {
                    btn.addEventListener('click', () => deleteReview(btn.dataset.id));
                });
            } catch (err) {
                container.innerHTML = '<p>Ошибка загрузки отзывов.</p>';
                console.error(err);
            }
        }

        async function deleteReview(id) {
            if (!confirm('Удалить отзыв?')) return;
            try {
                const res = await fetch(`/api/reviews/${id}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await res.json();
                if (res.ok) {
                    loadReviews();
                } else {
                    alert(data.error || 'Ошибка удаления');
                }
            } catch (err) {
                alert('Ошибка сети');
            }
        }

        loadActiveRequests();
    </script>
</body>
</html>
