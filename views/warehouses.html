<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Склады | ЛегатоСклад</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex: 1;
            padding-bottom: 3rem;
        }
        .warehouses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;                /* горизонтальный и вертикальный зазор */
            padding: 2rem 0;
            align-items: start;       /* чтобы карточки не растягивались по высоте ряда */
        }
        .warehouse-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            height: fit-content;      /* не даём карточке растягиваться больше, чем нужно */
        }
        .warehouse-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 30px -15px var(--accent-primary);
        }
        .warehouse-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }
        .warehouse-card .no-image {
            background: var(--bg-secondary);
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--text-muted);
        }
        .warehouse-card .card-body {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .warehouse-card h3 {
            margin: 0 0 0.5rem;
        }
        .warehouse-card h3 a {
            text-decoration: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            transition: color 0.2s;
        }
        .warehouse-card h3 a:hover {
            color: var(--accent-primary);
        }
        .warehouse-card .address {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 0.75rem;
        }
        .warehouse-card .address img {
            width: 18px;
            height: 18px;
            border: none;
        }
        .warehouse-card .details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .warehouse-card .price {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-primary);
        }
        .warehouse-card .price small {
            font-weight: 400;
            color: var(--text-muted);
        }
        .warehouse-card .area {
            font-weight: 600;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .warehouse-card .category {
            display: inline-block;
            background: var(--accent-primary);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-bottom: 0.75rem;
            align-self: flex-start;
        }
        .warehouse-card .btn-details {
            display: inline-block;
            background: var(--accent-gradient);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
            align-self: flex-start;
            margin-top: auto;
        }
        .warehouse-card .btn-details:hover {
            opacity: 0.9;
        }
        footer {
            padding: 1.5rem 0;
            font-size: 0.9rem;
            margin-top: auto;
            background: var(--bg-footer, var(--bg-secondary));
        }
        footer .container {
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-inner">
            <div class="logo">ЛегатоСклад</div>
            <nav class="nav-menu">
                <a href="/">Главная</a>
                <a href="/warehouses">Склады</a>
                <a href="/reviews">Отзывы</a>
                <a href="/about">О нас</a>
                <a href="/gallery">Галерея</a>
                <a href="/login">Вход</a>
                <a href="/register">Регистрация</a>
                <button id="theme-toggle" class="theme-toggle">
                    <img src="/icons/moon.svg" alt="Переключить тему">
                </button>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <h1 style="font-size: 2.5rem; margin: 2rem 0 1rem;">Доступные склады</h1>
            <p style="color: var(--text-secondary); margin-bottom: 1rem;">Выберите подходящее помещение для вашего бизнеса</p>

            <div id="warehouses-container" class="warehouses-grid">
                <p style="grid-column: 1/-1; text-align: center;">Загрузка складов...</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 ЛегатоСклад. Все права защищены.</p>
        </div>
    </footer>

    <script src="/js/auth.js"></script>
    <script src="/js/theme.js"></script>
    <script>
        function getImageSrc(imageUrl) {
            if (!imageUrl) return null;
            if (imageUrl.startsWith('http://') || imageUrl.startsWith('https://') || imageUrl.startsWith('/')) {
                return imageUrl;
            }
            return '/images/' + imageUrl;
        }

        async function loadWarehouses() {
            const container = document.getElementById('warehouses-container');
            try {
                const res = await fetch('/api/warehouses');
                const warehouses = await res.json();
                if (!warehouses.length) {
                    container.innerHTML = '<p style="grid-column:1/-1; text-align:center;">Нет доступных складов</p>';
                    return;
                }
                let html = '';
                warehouses.forEach(w => {
                    const imgSrc = getImageSrc(w.imageUrl);
                    html += `
                        <div class="warehouse-card">
                            ${imgSrc ? 
                                `<img src="${imgSrc}" alt="${w.name}" loading="lazy">` : 
                                `<div class="no-image">🏢</div>`
                            }
                            <div class="card-body">
                                <span class="category">${w.category || 'Общий'}</span>
                                <h3><a href="/warehouse/${w.id}">${w.name}</a></h3>
                                <div class="address">
                                    <img src="/icons/map-marker-alt.svg" alt="">
                                    ${w.address}
                                </div>
                                <div class="details">
                                    <div class="price">${w.pricePerMonth} <small>₽/м²/мес</small></div>
                                    <div class="area">${w.area} м²</div>
                                </div>
                                <a href="/dashboard?warehouseId=${w.id}" class="btn-details">Оставить заявку</a>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = '<p style="grid-column:1/-1; text-align:center; color: #fca5a5;">Ошибка загрузки данных</p>';
            }
        }
        loadWarehouses();
    </script>
</body>
</html>
